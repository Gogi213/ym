services:
  ingest-service:
    build:
      context: .
      dockerfile: Dockerfile.ingest-service
    env_file:
      - .env.ingest-service
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
